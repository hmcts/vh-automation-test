trigger: none
pr: none

schedules:
  - cron: '0 11 * * 1,2,3,4,5'
    displayName: Daily build
    always: true
    branches:
      include:
        - master

parameters:
  - name: runUITests
    displayName: Run UI Tests
    type: boolean
    default: true

  - name: runA11yTests
    displayName: Run Accessibility Tests
    type: boolean
    default: true

  - name: environment
    type: string
    default: Dev
    values:
      - Dev
      - Test
      - Stg

  - name: adminWebUrlOverride
    displayName: Admin Web Url Override
    type: string
    default: ''

  - name: videoWebUrlOverride
    displayName: Video Web Url Override
    type: string
    default: ''

  - name: bookingsApiUrlOverride
    displayName: Bookings Api Url Override
    type: string
    default: ' '

  - name: videoApiUrlOverride
    displayName: Video Api Url Override
    type: string
    default: ' '

  - name: userApiUrlOverride
    displayName: User Api Url Override
    type: string
    default: ' '

name: ${{ parameters.environment }}_UI_Daily_Tests_$(Date:yyyyMMdd)$(Rev:.r)

pool:
  name: 'VH Self Hosted'

stages:
  ####################################################
  # UI Testing. ######################################
  - stage: Automation_Tests_${{ parameters.environment }}
    displayName: Automation Tests ${{ parameters.environment }}
    jobs:
      - ${{ if eq(parameters.runUITests, true) }}:
          - job: UI_Tests
            displayName: UI Tests ${{ parameters.environment }}
            variables:
              - name: SystemConfiguration.EnvironmentConfigSettings.EnableAccessibilityCheck
                value: false
              - template: variables/${{ lower(parameters.environment) }}.yaml
              - template: variables/shared.yaml
                parameters:
                  environment: ${{ parameters.environment }}
              - group: vh-automation-test-${{ parameters.environment }}
              - group: FeatureFlags_${{ parameters.environment }}
              - group: Saucelabs
              - group: KinlyConfiguration_${{ parameters.environment }}
              - name: SystemConfiguration.EnvironmentConfigSettings.AdminUrl
                value: $[ coalesce('${{ parameters.adminWebUrlOverride }}', variables.adminWebUrl) ]
              - name: SystemConfiguration.EnvironmentConfigSettings.VideoUrl
                value: $[ coalesce('${{ parameters.videoWebUrlOverride }}', variables.videoWebUrl) ]
              - name: ApiClientConfiguration.BookingsApiUrl
                value: $[ coalesce('${{ parameters.bookingsApiUrlOverride }}', variables.bookingsApiUrl) ]
              - name: ApiClientConfiguration.VideoApiUrl
                value: $[ coalesce('${{ parameters.videoApiUrlOverride }}', variables.videoApiUrl) ]
              - name: ApiClientConfiguration.UserApiUrl
                value: $[ coalesce('${{ parameters.userApiUrlOverride }}', variables.userApiUrl) ]
              - name: TestDataConfiguration.AudioLinkCaseNumber
                value: ${{ variables.audioLinkCaseNumber }}
              - group: slack

            steps:
              - script: |
                  echo "BookingsApiUrl: $(ApiClientConfiguration.BookingsApiUrl)"
                  echo "VideoApiUrl: $(ApiClientConfiguration.VideoApiUrl)"
                  echo "UserApiUrl: $(ApiClientConfiguration.UserApiUrl)"
                  echo "VideoUrl": $(SystemConfiguration.EnvironmentConfigSettings.VideoUrl)
                  echo "AdminUrl": $(SystemConfiguration.EnvironmentConfigSettings.AdminUrl)
                displayName: 'Print variables'

              - template: pipelines/templates/run-ui-test.yaml
                parameters:
                  environment: ${{ parameters.environment }}
                  projectPath: ${{ variables.projectPath }}
                  testCategory: Daily
                  testRunTitle: 'UI Tests ${{ parameters.environment }}'
                  subscriptionName: ${{ variables.subscriptionName }}

              - task: PublishBuildArtifacts@1
                displayName: Publish UI Test Output
                condition: succeededOrFailed()
                inputs:
                  pathToPublish: '$(Agent.TempDirectory)/'
                  artifactName: UI_Report

              - ${{ if eq(variables['Build.SourceBranch'], 'refs/heads/master')}}:
                  - template: pipelines/templates/get-results-from-trx.yaml
                    parameters:
                      name: UI

                  - template: pipelines/templates/send-results-to-slack.yaml
                    parameters:
                      env: ${{ parameters.environment }}
                      results: $(testOutcome)
                      details: $(testSummary)
                      triggerID: $(triggerID)
                      type: UI Tests

      - ${{ if eq(parameters.runA11yTests, true) }}:
          - job: A11Y_Tests
            displayName: A11Y Tests ${{ parameters.environment }}
            variables:
              - template: variables/${{ lower(parameters.environment) }}.yaml
              - template: variables/shared.yaml
                parameters:
                  environment: ${{ parameters.environment }}
              - group: vh-automation-test-${{ parameters.environment }}
              - group: Saucelabs
              - group: FeatureFlags_${{ parameters.environment }}
              - group: KinlyConfiguration_${{ parameters.environment }}
              - name: SystemConfiguration.EnvironmentConfigSettings.RunOnSauceLabs
                value: true
              - name: SystemConfiguration.EnvironmentConfigSettings.EnableAccessibilityCheck
                value: true
              - name: SystemConfiguration.EnvironmentConfigSettings.AccessibilityReportFilePath
                value: $(Build.ArtifactStagingDirectory)/axe-results.json
              - name: SystemConfiguration.EnvironmentConfigSettings.AccessibilityHtmlReportFilePath
                value: $(Build.ArtifactStagingDirectory)/axe-results.html
              - name: ApiClientConfiguration.BookingsApiUrl
                value: ${{ variables.bookingsApiUrl }}
              - name: ApiClientConfiguration.VideoApiUrl
                value: ${{ variables.videoApiUrl }}
              - name: ApiClientConfiguration.UserApiUrl
                value: ${{ variables.userApiUrl }}
              - group: slack

            steps:
              - template: pipelines/templates/run-ui-test.yaml
                parameters:
                  environment: ${{ parameters.environment }}
                  projectPath: ${{ variables.projectPath }}
                  testCategory: a11y
                  testRunTitle: 'UI Tests ${{ parameters.environment }}'
                  subscriptionName: ${{ variables.subscriptionName }}

              - task: PublishBuildArtifacts@1
                displayName: Publish A11Y Output
                condition: succeededOrFailed()
                inputs:
                  pathToPublish: '$(Agent.TempDirectory)/'
                  artifactName: A11Y_Report

              - ${{ if eq(variables['Build.SourceBranch'], 'refs/heads/master')}}:
                  - template: pipelines/templates/get-results-from-trx.yaml
                    parameters:
                      name: A11y

                  - template: pipelines/templates/send-results-to-slack.yaml
                    parameters:
                      env: ${{ parameters.environment }}
                      results: $(testOutcome)
                      details: $(testSummary)
                      triggerID: $(triggerID)
                      type: A11y Tests
