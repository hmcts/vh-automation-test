
trigger: 
- master

pr:
- master

parameters:
- name: runUITests
  type: boolean
  default: true

- name: runApiTests
  type: boolean
  default: false

- name: environment
  type: string
  default: Dev
  values:
    - Dev
    - Demo
    - Stg
    - Prod

pool:
  name: 'vh-self-hosted'

stages:


- stage: Automation_Tests_${{ parameters.environment }}
  displayName: Automation Tests ${{ parameters.environment }}
  jobs:
  - ${{ if eq(parameters.runUITests, true) }}:
    - job: UI_Tests
      displayName: UI Tests ${{ parameters.environment }}
      variables:
      - name: env
        value: ${{ replace(parameters.environment, 'stg', 'staging') }}
      - name: projectPath
        value: "UI/Selenium"
      - group: vh-automation-test
      steps:

      - task: FileTransform@1
        displayName: Transform App Settings
        inputs:
          folderPath: $(projectPath)
          fileType: json
          targetFiles: appSettings.sds.json

      - bash: | 
          mv appSettings.json appSettings.old.json
          mv appSettings.sds.json appSettings.json
          cat appSettings.json
        displayName: Move App Settings
        workingDirectory: $(projectPath)

      - task: DotNetCoreCLI@2
        inputs:
          command: test
          projects: '$(projectPath)/*.csproj'
          arguments: '--configuration Release'

      - task: PublishTestResults@2
        condition: succeededOrFailed()